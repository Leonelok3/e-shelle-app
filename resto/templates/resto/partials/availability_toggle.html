{% load resto_tags %}
<div class="flex gap-1" x-data>
  <!-- Available -->
  <button hx-post="{% url 'resto:dish_availability_toggle' dish.pk %}"
          hx-vals='{"availability": "available"}'
          hx-target="#avail-{{ dish.pk }}"
          hx-swap="innerHTML"
          title="Disponible"
          class="px-2 py-1 text-xs rounded-lg border font-medium transition
                 {% if dish.availability == 'available' %}bg-green-500 text-white border-green-500{% else %}bg-white text-gray-400 border-gray-200 hover:border-green-300{% endif %}">
    ✓
  </button>
  <!-- In X minutes -->
  <button hx-post="{% url 'resto:dish_availability_toggle' dish.pk %}"
          hx-vals='{"availability": "in_x_minutes", "available_in_minutes": "20"}'
          hx-target="#avail-{{ dish.pk }}"
          hx-swap="innerHTML"
          title="Disponible dans 20 min"
          class="px-2 py-1 text-xs rounded-lg border font-medium transition
                 {% if dish.availability == 'in_x_minutes' %}bg-amber-400 text-white border-amber-400{% else %}bg-white text-gray-400 border-gray-200 hover:border-amber-300{% endif %}">
    ~
  </button>
  <!-- Unavailable -->
  <button hx-post="{% url 'resto:dish_availability_toggle' dish.pk %}"
          hx-vals='{"availability": "unavailable"}'
          hx-target="#avail-{{ dish.pk }}"
          hx-swap="innerHTML"
          title="Indisponible"
          class="px-2 py-1 text-xs rounded-lg border font-medium transition
                 {% if dish.availability == 'unavailable' %}bg-red-500 text-white border-red-500{% else %}bg-white text-gray-400 border-gray-200 hover:border-red-300{% endif %}">
    ✕
  </button>
</div>
