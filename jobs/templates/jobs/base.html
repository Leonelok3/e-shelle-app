{% load static %}
<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}E-Shelle Jobs{% endblock %}</title>
  <style>
    :root{--ink:#111827;--muted:#6B7280;--line:#E5E7EB;--bg:#F8FAFC;--brand:#2563EB;--green:#059669;--orange:#F97316}
    *{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;background:var(--bg);color:var(--ink)}a{text-decoration:none;color:inherit}
    .wrap{max-width:1120px;margin:0 auto;padding:0 18px}.topbar{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
    .nav{height:64px;display:flex;align-items:center;justify-content:space-between;gap:16px}.brand{display:flex;align-items:center;gap:10px;font-weight:900}.mark{width:38px;height:38px;border-radius:10px;background:#2563EB;color:#fff;display:grid;place-items:center;font-weight:900}
    .navlinks{display:flex;gap:10px;align-items:center}.navlinks a{font-size:14px;font-weight:800;color:#374151;padding:9px 12px;border-radius:8px}.navlinks a:hover{background:#EFF6FF;color:#1D4ED8}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:8px;padding:10px 14px;font-weight:900;border:1px solid transparent;background:#2563EB;color:#fff}.btn.secondary{background:#fff;color:#2563EB;border-color:#BFDBFE}.btn.green{background:#059669}
    .hero{padding:42px 0 26px;background:linear-gradient(180deg,#EFF6FF,#F8FAFC)}.hero-grid{display:grid;grid-template-columns:1.35fr .65fr;gap:24px;align-items:end}.kicker{font-weight:900;color:#2563EB;text-transform:uppercase;font-size:12px;letter-spacing:.08em}
    h1{font-size:clamp(34px,5vw,62px);line-height:.98;margin:10px 0 14px;letter-spacing:0}p{line-height:1.6}.lead{font-size:18px;color:#4B5563;max-width:680px}
    .search{margin-top:24px;display:grid;grid-template-columns:1.5fr 1fr auto;gap:10px;background:#fff;border:1px solid var(--line);padding:10px;border-radius:12px;box-shadow:0 18px 50px rgba(15,23,42,.08)}
    input,select,textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:12px 12px;font:inherit;background:#fff}label{font-size:13px;font-weight:900;color:#374151;display:block;margin-bottom:6px}
    .stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.stat{background:#fff;border:1px solid var(--line);border-radius:10px;padding:16px}.stat strong{font-size:28px;display:block;color:#2563EB}.muted{color:var(--muted)}
    .section{padding:28px 0}.head{display:flex;align-items:end;justify-content:space-between;gap:14px;margin-bottom:14px}.head h2{margin:0;font-size:24px}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:16px;display:flex;flex-direction:column;gap:12px}.card:hover{border-color:#BFDBFE;box-shadow:0 12px 32px rgba(37,99,235,.08)}
    .meta{display:flex;gap:8px;flex-wrap:wrap}.pill{font-size:12px;font-weight:900;color:#1F2937;background:#F3F4F6;border-radius:999px;padding:5px 9px}.pill.blue{background:#DBEAFE;color:#1D4ED8}.pill.green{background:#D1FAE5;color:#047857}
    .title{font-size:18px;font-weight:900}.company{font-weight:800;color:#4B5563}.salary{font-weight:900;color:#059669}.layout{display:grid;grid-template-columns:280px 1fr;gap:18px}.filters{background:#fff;border:1px solid var(--line);border-radius:10px;padding:16px;align-self:start;position:sticky;top:80px}
    .list{display:grid;gap:12px}.job-row{background:#fff;border:1px solid var(--line);border-radius:10px;padding:16px;display:grid;grid-template-columns:1fr auto;gap:14px}
    .detail{display:grid;grid-template-columns:1fr 340px;gap:18px;align-items:start}.panel{background:#fff;border:1px solid var(--line);border-radius:10px;padding:18px}.content h2{margin-top:24px}.formgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.messages{margin:14px 0}.message{padding:12px 14px;background:#ECFDF5;color:#047857;border:1px solid #A7F3D0;border-radius:8px;font-weight:800}
    @media(max-width:820px){.hero-grid,.grid,.layout,.detail{grid-template-columns:1fr}.search{grid-template-columns:1fr}.navlinks{display:none}.filters{position:static}.job-row{grid-template-columns:1fr}.formgrid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="wrap nav">
      <a class="brand" href="{% url 'jobs:accueil' %}"><span class="mark">J</span><span>E-Shelle Jobs</span></a>
      <nav class="navlinks">
        <a href="{% url 'jobs:catalogue' %}">Offres</a>
        <a href="{% url 'jobs:publier' %}">Publier</a>
        <a href="/">E-Shelle</a>
      </nav>
      <a class="btn" href="{% url 'jobs:publier' %}">Publier une offre</a>
    </div>
  </header>
  <main>
    {% if messages %}<div class="wrap messages">{% for message in messages %}<div class="message">{{ message }}</div>{% endfor %}</div>{% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
