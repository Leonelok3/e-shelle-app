{% extends 'agro/base_agro.html' %}

{% block content %}
<div class="container py-4" style="max-width: 700px;">
  <div class="d-flex align-items-center gap-3 mb-4">
    <a href="{% url 'agro:liste_offres' %}" class="btn btn-agro-outline btn-sm">
      <i class="bi bi-arrow-left me-1"></i>Retour
    </a>
    <h1 class="h4 fw-bold mb-0">Publier une offre commerciale</h1>
  </div>

  <div class="card agro-card">
    <div class="card-body">
      <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-3">
          <label class="form-label fw-semibold small">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}<div class="text-danger small mt-1">{{ field.errors.0 }}</div>{% endif %}
          {% if field.help_text %}<div class="form-text">{{ field.help_text }}</div>{% endif %}
        </div>
        {% endfor %}
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-agro">
            <i class="bi bi-megaphone me-1"></i>Publier l'offre
          </button>
          <a href="{% url 'agro:liste_offres' %}" class="btn btn-agro-outline">Annuler</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
