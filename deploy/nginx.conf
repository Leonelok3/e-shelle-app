    if ($host = adgen.e-shelle.com) { set $app_entry "/pub/"; }
    if ($host = services.e-shelle.com) { set $app_entry "/services/"; }
    if ($host = ai.e-shelle.com) { set $app_entry "/ai/"; }
    if ($host = jobs.e-shelle.com) { set $app_entry "/jobs/"; }
    if ($host = transport.e-shelle.com) { set $app_entry "/transport/"; }
    if ($host = anglais.e-shelle.com) { set $app_entry "/anglais/"; }
    if ($host = allemand.e-shelle.com) { set $app_entry "/allemand/"; }
    if ($host = italien.e-shelle.com) { set $app_entry "/italien/"; }
    if ($host = prep.e-shelle.com) { set $app_entry "/prep/"; }
    if ($host = langues.e-shelle.com) { set $app_entry "/langues/"; }

    location = / {
        return 302 $app_entry;
    }

    location /static/ {
        alias /home/eshelle/app/staticfiles/;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /home/eshelle/app/media/;
        expires 7d;
        access_log off;
