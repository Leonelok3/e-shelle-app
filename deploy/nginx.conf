##############################################################################
# Nginx — E-Shelle  (remplacer e-shelle.com par votre domaine)
# Fichier à placer : /etc/nginx/sites-available/eshelle
# Activer          : sudo ln -s /etc/nginx/sites-available/eshelle /etc/nginx/sites-enabled/
##############################################################################

upstream eshelle_gunicorn {
    server unix:/run/eshelle/gunicorn.sock fail_timeout=0;
}

# Redirection HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name e-shelle.com www.e-shelle.com;
    return 301 https://$host$request_uri;
}

# Serveur principal HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name e-shelle.com www.e-shelle.com;

    # --- Certificats SSL (générés par Certbot) ---
    ssl_certificate     /etc/letsencrypt/live/e-shelle.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/e-shelle.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # --- Sécurité ---
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # --- Taille max upload (produits digitaux 50 Mo) ---
    client_max_body_size 55M;

    # --- Logs ---
    access_log /var/log/nginx/eshelle_access.log;
    error_log  /var/log/nginx/eshelle_error.log;

    # --- Fichiers statiques (WhiteNoise les sert, Nginx en cache) ---
    location /static/ {
        alias /home/eshelle/app/staticfiles/;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # --- Fichiers média (uploads utilisateurs) ---
    location /media/ {
        alias /home/eshelle/app/media/;
        expires 7d;
        access_log off;
    }

    # --- Application Django via Gunicorn ---
    location / {
        proxy_pass         http://eshelle_gunicorn;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # --- Streaming SSE (générateur IA) — désactiver le buffering ---
    location /ia/stream/ {
        proxy_pass         http://eshelle_gunicorn;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }

    # --- Bloquer les fichiers sensibles ---
    location ~ /\.(?!well-known) {
        deny all;
    }
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }
}
