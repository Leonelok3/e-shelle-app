{% extends "base.html" %}
{% block title %}Changer le mot de passe — E-Shelle{% endblock %}
{% block content %}
<div style="padding-top:5rem">
  <section class="section">
    <div class="container" style="max-width:520px">
      <div class="glass-card">
        <h1 style="font-family:var(--font-display);font-size:1.3rem;font-weight:700;margin-bottom:1.5rem">🔒 Changer le mot de passe</h1>
        <form method="post">
          {% csrf_token %}
          {% for field in form %}
          <div class="form-group">
            <label class="form-label">{{ field.label }}</label>
            <input type="password" name="{{ field.html_name }}" class="form-control" required>
            {% if field.errors %}<div style="color:var(--error);font-size:.8rem;margin-top:.3rem">{{ field.errors.0 }}</div>{% endif %}
          </div>
          {% endfor %}
          <button type="submit" class="btn btn-primary btn-block">Modifier le mot de passe</button>
        </form>
        <div style="margin-top:1rem;text-align:center">
          <a href="{% url 'accounts:profil' %}" style="font-size:.85rem;color:var(--text-muted)">← Retour au profil</a>
        </div>
      </div>
    </div>
  </section>
</div>
{% endblock %}
