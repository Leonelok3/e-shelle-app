{% extends "base.html" %}
{% block title %}Mot de passe modifié — E-Shelle{% endblock %}
{% block content %}
<div style="padding-top:5rem">
  <section class="section">
    <div class="container" style="max-width:480px">
      <div class="glass-card" style="text-align:center;padding:3rem">
        <div style="font-size:3rem;margin-bottom:1rem">✅</div>
        <h1 style="font-family:var(--font-display);font-size:1.3rem;font-weight:700;margin-bottom:.75rem">Mot de passe modifié !</h1>
        <p style="color:var(--text-muted);margin-bottom:1.5rem">Votre mot de passe a été mis à jour avec succès.</p>
        <a href="{% url 'accounts:profil' %}" class="btn btn-primary">Retour au profil</a>
      </div>
    </div>
  </section>
</div>
{% endblock %}
