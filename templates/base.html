<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>E-shelle</title>

  <!-- Bootstrap CSS (CDN) -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  >
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="/" aria-label="Accueil E-shelle">E-shelle</a>

      <div class="d-flex gap-2">
        {% if user.is_authenticated %}
          <a class="btn btn-outline-light btn-sm" href="{% url 'accounts:go' %}">Mon espace</a>
          <a class="btn btn-outline-warning btn-sm" href="{% url 'accounts:logout' %}">Déconnexion</a>
        {% else %}
          <a class="btn btn-outline-light btn-sm" href="{% url 'accounts:login' %}">Connexion</a>
        {% endif %}
      </div>
    </div>
  </nav>

  <main class="container py-4">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
