{% extends "base.html" %}
{% block content %}
<div class="p-4 bg-light rounded">
  <h1 class="h3">Bienvenue sur E-shelle</h1>
  <p>Plateforme d’apprentissage : leçons, exercices, examens blancs et sujets d’examen (PDF).</p>

  {% if user.is_authenticated %}
    <a class="btn btn-primary" href="{% url 'accounts:go' %}">Aller à mon espace</a>
  {% else %}
    <a class="btn btn-primary" href="{% url 'accounts:login' %}">Se connecter</a>
  {% endif %}
</div>
{% endblock %}
