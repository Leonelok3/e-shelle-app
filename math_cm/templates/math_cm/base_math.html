{% extends "base.html" %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<style>
:root {
  --math-primary: #6C63FF;
  --math-secondary: #2E7D32;
  --math-accent: #F57C00;
  --math-bg: #0D0D1A;
  --math-card: rgba(255,255,255,0.04);
  --math-border: rgba(108,99,255,0.2);
  --math-text: #E8E8F0;
  --math-muted: #8888AA;
  --math-gradient: linear-gradient(135deg, #6C63FF 0%, #2E7D32 100%);
  --math-glow: 0 0 30px rgba(108,99,255,0.2);
}
.math-card {
  background: var(--math-card);
  border: 1px solid var(--math-border);
  border-radius: 16px;
  padding: 1.5rem;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}
.math-card:hover {
  border-color: rgba(108,99,255,0.5);
  box-shadow: var(--math-glow);
  transform: translateY(-3px);
}
.math-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background: var(--math-gradient); opacity:0; transition: opacity 0.3s;
}
.math-card:hover::before { opacity:1; }
.btn-math {
  background: var(--math-gradient); color: white; border: none;
  border-radius: 10px; padding: 0.75rem 1.5rem; font-weight: 600;
  cursor: pointer; transition: all 0.3s; display:inline-flex; align-items:center; gap:0.5rem;
  text-decoration: none;
}
.btn-math:hover { transform:translateY(-2px); box-shadow: var(--math-glow); color:white; }
.btn-math-outline {
  background: transparent; color: var(--math-primary);
  border: 1px solid var(--math-primary); border-radius: 10px;
  padding: 0.75rem 1.5rem; font-weight: 600; cursor: pointer;
  transition: all 0.3s; display:inline-flex; align-items:center; gap:0.5rem; text-decoration:none;
}
.btn-math-outline:hover { background: var(--math-primary); color:white; }
.formule-block {
  background: rgba(108,99,255,0.1);
  border: 1px solid rgba(108,99,255,0.3);
  border-left: 4px solid var(--math-primary);
  border-radius: 8px; padding: 1rem 1.25rem;
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.05rem; margin: 1rem 0; color: #A8A4FF;
}
.bloc-definition { background:rgba(108,99,255,0.08); border-left:4px solid var(--math-primary); border-radius:0 8px 8px 0; padding:1rem 1.25rem; margin:1rem 0; }
.bloc-theoreme   { background:rgba(46,125,50,0.08);  border-left:4px solid var(--math-secondary); border-radius:0 8px 8px 0; padding:1rem 1.25rem; margin:1rem 0; }
.bloc-exemple    { background:rgba(245,124,0,0.08);  border-left:4px solid var(--math-accent);    border-radius:0 8px 8px 0; padding:1rem 1.25rem; margin:1rem 0; }
.bloc-remarque   { background:rgba(255,193,7,0.08);  border-left:4px solid #FFC107;               border-radius:0 8px 8px 0; padding:1rem 1.25rem; margin:1rem 0; }
.bloc-methode    { background:rgba(33,150,243,0.08); border-left:4px solid #2196F3;               border-radius:0 8px 8px 0; padding:1rem 1.25rem; margin:1rem 0; }
.progress-math { background:rgba(255,255,255,0.1); border-radius:100px; height:8px; overflow:hidden; }
.progress-math-fill { background:var(--math-gradient); height:100%; border-radius:100px; transition:width 0.8s cubic-bezier(0.4,0,0.2,1); }
.badge-niveau { display:inline-flex; align-items:center; gap:.25rem; padding:.2rem .7rem; border-radius:100px; font-size:.75rem; font-weight:600; }
.badge-decouverte       { background:rgba(76,175,80,0.2);  color:#4CAF50; }
.badge-entrainement     { background:rgba(33,150,243,0.2); color:#2196F3; }
.badge-approfondissement{ background:rgba(245,124,0,0.2);  color:#F57C00; }
.badge-examen           { background:rgba(244,67,54,0.2);  color:#F44336; }
.stat-number { font-size:2.5rem; font-weight:800; background:var(--math-gradient); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; line-height:1; }
.stat-label  { color:var(--math-muted); font-size:.875rem; margin-top:.25rem; }
.math-bc { display:flex; align-items:center; gap:.5rem; font-size:.85rem; color:var(--le-text-muted); margin-bottom:1.5rem; flex-wrap:wrap; }
.math-bc a { color:var(--le-text-muted); text-decoration:none; }
.math-bc a:hover { color:var(--math-primary); }
.math-bc-sep { opacity:.4; }
@media(max-width:768px){ .math-card{ padding:1rem; } .stat-number{ font-size:1.75rem; } }
</style>
{% endblock %}

{% block content %}
<div style="padding-top:5.5rem">
  {% block math_content %}{% endblock %}
</div>
{% endblock %}

{% block extra_scripts %}
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
  onload="renderMathInElement(document.body,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}]});"></script>
{% endblock %}
